        <div class="container">
            <div class="btn btn-info" role="alert" id="pgNum"></div>
            <div style='margin-left: 10px;' class='btn btn-info' onclick="resetImage()">reset</div>
            <div style='margin-left: 10px;' class='btn btn-info' onclick="prevImage()">prev</div>
            <div style='margin-left: 10px;' class='btn btn-info' onclick="nextImage()">next</div>

        </div>
    <script>
        function setPgNum() {
            var images = document.getElementById("imgs").children;
            for(var i = 0; i < images.length; i++) {
                if (images[i].style.display!="none"){
                    document.getElementById("pgNum").textContent = (i + 1) + " / " + images.length;
                    return;
                }
            }
        }

        function resetImage() {
            var images = document.getElementById("imgs").children;
            for(var i = 0; i < images.length; i++) {
                if (i == 0)
                    images[i].style.display="inline-block";
                else
                    images[i].style.display="none";

            }
            setPgNum()
        }
        function nextImage() {
            var images = document.getElementById("imgs").children;
            for(var i = 0; i < images.length; i++) {
                if (images[i].style.display != "none" || i == (images.length - 1)){
                    images[i].style.display="none";
                    images[(i + 1) % images.length].style.display="inline-block";
                    setPgNum()
                    break
                }
            }
        }
        nextImage();
        function prevImage() {
            // node.style.display="none"
            var images = document.getElementById("imgs").children;
            for(var i = 0; i < images.length; i++) {
                if (images[i].style.display != "none"){
                    images[i].style.display="none";
                    images[(i - 1 + images.length) % images.length].style.display="inline-block";
                    setPgNum()
                    break
                }
            }
        }
    </script>
