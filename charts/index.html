<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Charts</title>
</head>
<body>
<script>
 urlParams = new URLSearchParams(window.location.search);
 ticker_to_url = JSON.parse(urlParams.get('data'));
 first=true;
 document.write('<br><br>')
 for (var ticker in ticker_to_url){
    // document.write(`<h2 style="color:#86b7fe">${ticker}</h2>`);
     if (!first)
        document.write('<hr><br>')
     first=false
    for (var img in ticker_to_url[ticker]){
        document.write(`<img style="margin:10px;max-width: 100%; max-height: 100vh; height: auto;" src="https://finviz.com/${ticker_to_url[ticker][img]}"><br><br>`);
    }
 }

 document.write('<br><br><br><br>')

</script>
</body>
</html>
